<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime Recommender</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d14;
      color: #e0e0f0;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 1.5rem;
      background: linear-gradient(180deg, #1a0a2e 0%, #0d0d14 100%);
      border-bottom: 1px solid #2a1a4a;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.5rem;
      color: #8878aa;
      font-size: 0.95rem;
    }

    .search-section {
      max-width: 720px;
      margin: 2.5rem auto 0;
      padding: 0 1rem;
    }

    .search-box {
      display: flex;
      gap: 0.75rem;
    }

    textarea {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      border-radius: 12px;
      color: #e0e0f0;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      resize: none;
      height: 56px;
      line-height: 1.5;
      transition: border-color 0.2s, height 0.2s;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: #a78bfa;
      height: 100px;
    }

    textarea::placeholder { color: #4a3a6a; }

    button#search-btn {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 0 1.5rem;
      height: 56px;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
      align-self: flex-start;
    }

    button#search-btn:hover { opacity: 0.9; }
    button#search-btn:active { transform: scale(0.97); }
    button#search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .examples {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .example-chip {
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      border-radius: 20px;
      color: #8878aa;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.3rem 0.8rem;
      transition: border-color 0.2s, color 0.2s;
    }

    .example-chip:hover { border-color: #a78bfa; color: #a78bfa; }

    .status {
      text-align: center;
      margin-top: 3rem;
      color: #6a5a8a;
      font-size: 0.95rem;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #3a2a5a;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      color: #f87171;
      text-align: center;
      margin-top: 3rem;
    }

    .results {
      max-width: 960px;
      margin: 2.5rem auto 4rem;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: #13132a;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover { transform: translateY(-4px); border-color: #7c3aed; }

    .card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #1a1a2e;
    }

    .card-image-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #1a0a2e, #2a1a4e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3a2a5a;
      font-size: 3rem;
    }

    .card-body {
      padding: 1rem 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      flex: 1;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #f0e8ff;
      line-height: 1.3;
    }

    .card-meta {
      display: flex;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: #7a6a9a;
    }

    .card-meta span { display: flex; align-items: center; gap: 0.25rem; }

    .score { color: #fbbf24; }

    .genres {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .genre-tag {
      background: #1e1040;
      border: 1px solid #3a2a6a;
      border-radius: 20px;
      color: #a78bfa;
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
    }

    .synopsis {
      font-size: 0.82rem;
      color: #7a6a9a;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .reason {
      font-size: 0.8rem;
      color: #c4b5fd;
      font-style: italic;
      border-left: 2px solid #7c3aed;
      padding-left: 0.6rem;
      line-height: 1.4;
    }

    .card { cursor: pointer; }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: #13132a;
      border: 1px solid #3a2a6a;
      border-radius: 20px;
      max-width: 560px;
      width: 100%;
      overflow: hidden;
      animation: popIn 0.2s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.95); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      object-position: top;
      background: #1a1a2e;
    }

    .modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

    .modal-title { font-size: 1.3rem; font-weight: 700; color: #f0e8ff; }

    .modal-meta { display: flex; gap: 1rem; font-size: 0.85rem; color: #7a6a9a; }

    .modal-explanation {
      font-size: 0.92rem;
      line-height: 1.7;
      color: #c4b5fd;
    }

    .modal-explanation.loading { color: #4a3a6a; font-style: italic; }

    .modal-close {
      align-self: flex-end;
      background: #1e1040;
      border: 1px solid #3a2a6a;
      border-radius: 8px;
      color: #a78bfa;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.4rem 1rem;
    }

    .modal-close:hover { background: #2a1a5a; }
  </style>
</head>
<body>

<header>
  <h1>Anime Recommender</h1>
  <p>Describe what you're in the mood for — We will find the perfect match.</p>
</header>

<div class="search-section">
  <div class="search-box">
    <textarea id="pref-input" placeholder="e.g. dark fantasy with complex characters and slow world-building..."></textarea>
    <button id="search-btn" onclick="getRecommendations()">Recommend</button>
  </div>
  <div class="examples">
    <span class="example-chip" onclick="useExample(this)">dark fantasy, morally grey</span>
    <span class="example-chip" onclick="useExample(this)">cozy slice of life, emotional</span>
    <span class="example-chip" onclick="useExample(this)">mecha, epic battles</span>
    <span class="example-chip" onclick="useExample(this)">psychological thriller</span>
    <span class="example-chip" onclick="useExample(this)">romance, high school</span>
  </div>
</div>

<div id="status"></div>
<div id="results" class="results"></div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <img id="modal-img" class="modal-image" src="" alt="" />
    <div class="modal-body">
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-meta" class="modal-meta"></div>
      <div id="modal-explanation" class="modal-explanation loading">Asking Claude why this fits your taste…</div>
      <button class="modal-close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
  const input = document.getElementById('pref-input');
  const btn = document.getElementById('search-btn');
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  const backdrop = document.getElementById('modal-backdrop');

  let lastPreference = '';
  let stepTimer = null;

  const STEPS = [
    "Identifying genres from your preference…",
    "Searching anime database on MyAnimeList…",
    "Reading web reviews for top candidates…",
    "Ranking the best matches for you…",
    "Fetching artwork and metadata…",
  ];

  function startLoadingSteps() {
    let i = 0;
    statusEl.innerHTML = `<span class="spinner"></span> ${STEPS[0]}`;
    stepTimer = setInterval(() => {
      i = Math.min(i + 1, STEPS.length - 1);
      statusEl.innerHTML = `<span class="spinner"></span> ${STEPS[i]}`;
    }, 2500);
  }

  function stopLoadingSteps() {
    clearInterval(stepTimer);
    stepTimer = null;
    statusEl.innerHTML = '';
  }

  function openModal(anime) {
    document.getElementById('modal-title').textContent = anime.title;
    document.getElementById('modal-meta').innerHTML = [
      anime.score != null ? `★ ${anime.score.toFixed(1)}` : '',
      anime.episodes != null ? `📺 ${anime.episodes} ep` : '',
      anime.genres.join(' · '),
    ].filter(Boolean).join('&nbsp;&nbsp;');

    const img = document.getElementById('modal-img');
    if (anime.image_url) {
      img.src = anime.image_url;
      img.style.display = 'block';
    } else {
      img.style.display = 'none';
    }

    const expl = document.getElementById('modal-explanation');
    expl.innerHTML = '';
    expl.className = 'modal-explanation';
    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';

    fetch('/api/explain', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        preference: lastPreference,
        title: anime.title,
        synopsis: anime.synopsis,
        genres: anime.genres,
      }),
    })
      .then(async res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          expl.innerHTML = renderMarkdown(buffer);
        }
      })
      .catch(() => {
        expl.textContent = 'Could not load explanation.';
      });
  }

  function closeModal(e) {
    if (e && e.target !== backdrop) return;
    backdrop.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); getRecommendations(); }
  });

  function useExample(el) {
    input.value = el.textContent;
    input.focus();
  }

  async function getRecommendations() {
    const preferences = input.value.trim();
    if (!preferences) return;
    lastPreference = preferences;

    btn.disabled = true;
    resultsEl.innerHTML = '';
    startLoadingSteps();

    try {
      const res = await fetch('/api/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ preferences }),
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();

      stopLoadingSteps();
      renderCards(data.recommendations);
    } catch (err) {
      stopLoadingSteps();
      statusEl.innerHTML = `<p class="error">Something went wrong: ${err.message}</p>`;
    } finally {
      btn.disabled = false;
    }
  }

  function renderCards(anime) {
    if (!anime.length) {
      statusEl.innerHTML = '<p class="status">No results found. Try a different description.</p>';
      return;
    }

    // Store anime data for modal access
    window._animeData = {};
    anime.forEach(a => { window._animeData[a.id] = a; });

    resultsEl.innerHTML = anime.map(a => `
      <div class="card" onclick="openModal(window._animeData[${a.id}])">
        ${a.image_url
          ? `<img class="card-image" src="${a.image_url}" alt="${escHtml(a.title)}" loading="lazy" onerror="this.replaceWith(placeholder())">`
          : `<div class="card-image-placeholder">🎌</div>`}
        <div class="card-body">
          <div class="card-title">${escHtml(a.title)}</div>
          <div class="card-meta">
            ${a.score != null ? `<span class="score">★ ${a.score.toFixed(1)}</span>` : ''}
            ${a.episodes != null ? `<span>📺 ${a.episodes} ep</span>` : ''}
          </div>
          <div class="genres">
            ${a.genres.map(g => `<span class="genre-tag">${escHtml(g)}</span>`).join('')}
          </div>
          ${a.reason ? `<p class="reason">${escHtml(a.reason)}</p>` : ''}
          ${a.synopsis ? `<p class="synopsis">${escHtml(a.synopsis)}</p>` : ''}
        </div>
      </div>
    `).join('');
  }

  function renderMarkdown(text) {
    return escHtml(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function placeholder() {
    const d = document.createElement('div');
    d.className = 'card-image-placeholder';
    d.textContent = '🎌';
    return d;
  }
</script>
</body>
</html>
