<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch my Show!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d14;
      color: #e0e0f0;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 1.5rem;
      background: linear-gradient(180deg, #1a0a2e 0%, #0d0d14 100%);
      border-bottom: 1px solid #2a1a4a;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.5rem;
      color: #8878aa;
      font-size: 0.95rem;
    }

    .bmc-footer {
      text-align: center;
      padding: 2rem 1rem 2.5rem;
    }

    .bmc-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      border-radius: 24px;
      color: #fbbf24;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.6rem 1.4rem;
      text-decoration: none;
      transition: border-color 0.25s, background 0.25s, transform 0.15s;
    }

    .bmc-link:hover {
      border-color: #fbbf24;
      background: #1e1a10;
      transform: translateY(-2px);
    }

    .bmc-icon { font-size: 1.15rem; }

    .search-section {
      max-width: 720px;
      margin: 2.5rem auto 0;
      padding: 0 1rem;
    }

    .search-box {
      display: flex;
      gap: 0.75rem;
    }

    textarea {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      border-radius: 12px;
      color: #e0e0f0;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      resize: none;
      height: 56px;
      line-height: 1.5;
      transition: border-color 0.2s, height 0.2s;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: #a78bfa;
      height: 100px;
    }

    textarea::placeholder { color: #4a3a6a; }

    button#search-btn {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 0 1.5rem;
      height: 56px;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
      align-self: flex-start;
    }

    button#search-btn:hover { opacity: 0.9; }
    button#search-btn:active { transform: scale(0.97); }
    button#search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .examples {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .example-chip {
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      border-radius: 20px;
      color: #8878aa;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.3rem 0.8rem;
      transition: border-color 0.2s, color 0.2s;
    }

    .example-chip:hover { border-color: #a78bfa; color: #a78bfa; }

    .mode-toggle {
      display: flex;
      justify-content: center;
      margin-top: 0.9rem;
      gap: 0;
    }

    .mode-btn {
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      color: #6a5a8a;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.4rem 1.1rem;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
      position: relative;
    }

    .mode-btn:first-child {
      border-radius: 20px 0 0 20px;
      border-right: none;
    }

    .mode-btn:last-child {
      border-radius: 0 20px 20px 0;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #7c3aed22, #db277722);
      border-color: #7c3aed;
      color: #e0d0ff;
    }

    .mode-btn:last-child.active {
      border-left-color: #7c3aed;
    }

    .mode-btn:not(.active):hover {
      border-color: #4a3a6a;
      color: #a090c0;
    }

    .mode-icon {
      margin-right: 0.35rem;
      font-size: 0.9rem;
    }

    .category-tabs {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
    }

    .cat-tab {
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      border-radius: 10px;
      color: #6a5a8a;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.5rem 1.1rem;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .cat-tab.active {
      background: linear-gradient(135deg, #7c3aed33, #db277733);
      border-color: #7c3aed;
      color: #e0d0ff;
    }

    .cat-tab:not(.active):hover {
      border-color: #4a3a6a;
      color: #a090c0;
    }

    .cat-icon {
      margin-right: 0.3rem;
    }

    .creativity-slider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .creativity-slider label {
      font-size: 0.78rem;
      color: #6a5a8a;
      white-space: nowrap;
      min-width: 70px;
    }

    .creativity-slider label:first-of-type { text-align: right; }
    .creativity-slider label:last-of-type { text-align: left; }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 0.8rem;
      margin-bottom: 0.2rem;
    }

    .count-selector {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .count-selector .count-label {
      font-size: 0.78rem;
      color: #6a5a8a;
      margin-right: 0.5rem;
      white-space: nowrap;
    }

    .count-btn {
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      color: #6a5a8a;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .count-btn:first-of-type { border-radius: 16px 0 0 16px; border-right: none; }
    .count-btn:last-of-type { border-radius: 0 16px 16px 0; }
    .count-btn:not(:first-of-type):not(:last-of-type) { border-right: none; }

    .count-btn.active {
      background: linear-gradient(135deg, #7c3aed22, #db277722);
      border-color: #7c3aed;
      color: #e0d0ff;
    }

    .count-btn:last-of-type.active { border-left-color: #7c3aed; }
    .count-btn:not(:first-of-type):not(:last-of-type).active { border-right-color: #7c3aed; border-left-color: #7c3aed; }
    .count-btn:first-of-type.active + .count-btn { border-left-color: #7c3aed; }

    .count-btn:not(.active):hover {
      border-color: #4a3a6a;
      color: #a090c0;
    }

    .creativity-slider input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 180px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #2e2e50, #7c3aed, #db2777);
      outline: none;
      cursor: pointer;
    }

    .creativity-slider input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e0d0ff;
      border: 2px solid #7c3aed;
      box-shadow: 0 0 6px #7c3aed88;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .creativity-slider input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .creativity-slider input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e0d0ff;
      border: 2px solid #7c3aed;
      box-shadow: 0 0 6px #7c3aed88;
      cursor: pointer;
    }

    .status {
      text-align: center;
      margin-top: 3rem;
      color: #6a5a8a;
      font-size: 0.95rem;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #3a2a5a;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      color: #f87171;
      text-align: center;
      margin-top: 3rem;
    }

    .results {
      max-width: 960px;
      margin: 2.5rem auto 4rem;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: #13132a;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover { transform: translateY(-4px); border-color: #7c3aed; }

    .card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #1a1a2e;
    }

    .card-image-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #1a0a2e, #2a1a4e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3a2a5a;
      font-size: 3rem;
    }

    .card-body {
      padding: 1rem 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      flex: 1;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #f0e8ff;
      line-height: 1.3;
    }

    .card-meta {
      display: flex;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: #7a6a9a;
    }

    .card-meta span { display: flex; align-items: center; gap: 0.25rem; }

    .score { color: #fbbf24; }

    .genres {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .genre-tag {
      background: #1e1040;
      border: 1px solid #3a2a6a;
      border-radius: 20px;
      color: #a78bfa;
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
    }

    .theme-tag {
      background: #0e1a2a;
      border: 1px solid #1a3a5a;
      border-radius: 20px;
      color: #60a5fa;
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
    }

    .synopsis {
      font-size: 0.82rem;
      color: #7a6a9a;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .reason {
      font-size: 0.8rem;
      color: #c4b5fd;
      font-style: italic;
      border-left: 2px solid #7c3aed;
      padding-left: 0.6rem;
      line-height: 1.4;
    }

    .card { cursor: pointer; position: relative; }

    .card-actions {
      display: flex;
      gap: 0.4rem;
      padding: 0 1.1rem 0.8rem;
    }

    .dismiss-btn {
      flex: 1;
      padding: 0.35rem 0;
      border: 1px solid #2e2e50;
      border-radius: 8px;
      background: #1a1a2e;
      color: #6a5a8a;
      font-size: 0.72rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .dismiss-btn:hover {
      border-color: #7c3aed;
      color: #c4b5fd;
      background: #1e1040;
    }

    .dismiss-btn.watched:hover { border-color: #22c55e; color: #86efac; }
    .dismiss-btn.not-interested:hover { border-color: #ef4444; color: #fca5a5; }

    .card-wrapper {
      perspective: 1000px;
    }

    .card-wrapper.flipping .card {
      animation: cardFlip 0.5s ease-in-out;
    }

    @keyframes cardFlip {
      0% { transform: rotateY(0deg) scale(1); opacity: 1; }
      50% { transform: rotateY(90deg) scale(0.95); opacity: 0.5; }
      100% { transform: rotateY(0deg) scale(1); opacity: 1; }
    }

    .card-wrapper.no-reserve .dismiss-btn {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: #13132a;
      border: 1px solid #3a2a6a;
      border-radius: 20px;
      max-width: 560px;
      width: 100%;
      overflow: hidden;
      animation: popIn 0.2s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.95); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      object-position: top;
      background: #1a1a2e;
    }

    .modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

    .modal-title { font-size: 1.3rem; font-weight: 700; color: #f0e8ff; }

    .modal-meta { display: flex; gap: 1rem; font-size: 0.85rem; color: #7a6a9a; }

    .provider-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      min-height: 28px;
    }

    .provider-label {
      font-size: 0.75rem;
      color: #6a5a8a;
      font-weight: 500;
      margin-right: 0.2rem;
    }

    .provider-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: #1e1040;
      border: 1px solid #2e2e50;
      border-radius: 6px;
      padding: 0.2rem 0.55rem;
      font-size: 0.72rem;
      color: #c4b5fd;
      transition: border-color 0.2s;
    }

    .provider-badge:hover { border-color: #7c3aed; }

    .provider-badge img {
      width: 18px;
      height: 18px;
      border-radius: 4px;
    }

    .provider-bar .prov-loading {
      font-size: 0.72rem;
      color: #4a3a6a;
      font-style: italic;
    }

    .modal-explanation {
      font-size: 0.92rem;
      line-height: 1.7;
      color: #c4b5fd;
    }

    .modal-explanation.loading { color: #4a3a6a; font-style: italic; }

    .modal-close {
      align-self: flex-end;
      background: #1e1040;
      border: 1px solid #3a2a6a;
      border-radius: 8px;
      color: #a78bfa;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.4rem 1rem;
    }

    .modal-close:hover { background: #2a1a5a; }

    /* ── Loading scene ── */
    .loading-scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 3rem;
      padding: 1.5rem 0 0;
    }

    .scene-stage {
      position: relative;
      width: 240px;
      height: 130px;
    }

    /* Chibi character — common */
    .chibi-char {
      position: absolute;
      bottom: 10px;
      left: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: chibi-hop 1.1s ease-in-out infinite;
    }

    .chibi-head { position: relative; animation: squash 1.1s ease-in-out infinite; }

    .chibi-face {
      width: 46px; height: 42px;
      background: #fde4d2;
      border-radius: 50%;
      position: relative; z-index: 2;
    }

    .c-eye {
      position: absolute; width: 5px; height: 7px;
      border-radius: 50%; top: 16px;
      animation: blink 3.5s ease-in-out infinite;
    }
    .c-eye.l { left: 12px; }
    .c-eye.r { right: 12px; }

    .c-blush {
      position: absolute; top: 22px;
      width: 8px; height: 5px;
      background: rgba(255,140,140,0.4);
      border-radius: 50%; z-index: 3;
    }
    .c-blush.l { left: 4px; }
    .c-blush.r { right: 4px; }

    .c-mouth {
      position: absolute; bottom: 10px; left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 3px;
      border-bottom: 2px solid #d4a0a0;
      border-radius: 0 0 50% 50%;
    }

    .chibi-outfit {
      width: 32px; height: 18px;
      border-radius: 4px 4px 6px 6px;
      margin-top: -2px;
    }

    .chibi-shadow {
      width: 38px; height: 7px;
      background: rgba(120,80,180,0.12);
      border-radius: 50%; margin-top: 3px;
      animation: shadow-scale 1.1s ease-in-out infinite;
    }

    .chibi-hair {
      position: absolute; top: -3px; left: -3px; right: -3px;
      height: 24px; border-radius: 50% 50% 0 0; z-index: 3;
    }

    /* ── Anya Forger ── */
    .hair-anya { background: #f7a8b8; }
    .hair-anya::before, .hair-anya::after {
      content: ''; position: absolute;
      width: 12px; height: 14px;
      background: #f7a8b8; border-radius: 50%; top: -8px;
    }
    .hair-anya::before { left: 6px; }
    .hair-anya::after { right: 6px; }

    /* ── Mikasa Ackerman ── */
    .hair-mikasa { background: #1a1a2e; }
    .hair-mikasa::before, .hair-mikasa::after {
      content: ''; position: absolute;
      width: 7px; height: 18px;
      background: #1a1a2e; border-radius: 0 0 3px 3px; bottom: -14px;
    }
    .hair-mikasa::before { left: 0; }
    .hair-mikasa::after { right: 0; }

    .chibi-scarf {
      position: absolute; bottom: -4px; left: 50%;
      transform: translateX(-50%);
      width: 52px; height: 7px;
      background: #dc2626; border-radius: 3px; z-index: 4;
    }

    /* ── Goku ── */
    .hair-goku { background: #1a1a2e; top: -2px; }
    .hair-goku::before {
      content: ''; position: absolute;
      top: -20px; left: -6px; right: -6px; height: 26px;
      background: #1a1a2e;
      clip-path: polygon(
        0% 100%, 5% 45%, 18% 100%, 22% 18%, 38% 100%,
        50% 0%, 62% 100%, 78% 18%, 82% 100%, 95% 45%, 100% 100%
      );
    }

    /* ── Edward Elric ── */
    .hair-edward { background: #fbbf24; }
    .hair-edward::before {
      content: ''; position: absolute;
      top: -14px; left: 50%; transform: translateX(-50%) rotate(5deg);
      width: 3px; height: 16px;
      background: #fbbf24; border-radius: 2px;
    }
    .hair-edward::after {
      content: ''; position: absolute;
      right: -1px; bottom: -16px;
      width: 5px; height: 18px;
      background: #fbbf24; border-radius: 0 0 3px 3px;
    }

    /* ── Zero Two ── */
    .hair-zerotwo { background: #f472b6; }
    .hair-zerotwo::before, .hair-zerotwo::after {
      content: ''; position: absolute;
      bottom: -18px; width: 6px; height: 20px;
      background: #f472b6; border-radius: 0 0 3px 3px;
    }
    .hair-zerotwo::before { left: -1px; }
    .hair-zerotwo::after { right: -1px; }

    .chibi-horns {
      position: absolute; top: -5px; left: 50%;
      transform: translateX(-50%);
      width: 34px; display: flex;
      justify-content: space-between; z-index: 5;
    }
    .horn {
      width: 6px; height: 10px;
      background: #ef4444; border-radius: 50% 50% 20% 20%;
    }
    .horn.l { transform: rotate(-15deg); }
    .horn.r { transform: rotate(15deg); }

    .loading-quote {
      font-size: 0.85rem; color: #8878aa;
      font-style: italic; text-align: center;
    }

    @keyframes chibi-hop {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      45% { transform: translateX(-50%) translateY(-24px); }
    }

    @keyframes squash {
      0%, 100% { transform: scaleX(1) scaleY(1); }
      20% { transform: scaleX(0.94) scaleY(1.08); }
      45% { transform: scaleX(1) scaleY(1); }
      80% { transform: scaleX(1.1) scaleY(0.9); }
    }

    @keyframes shadow-scale {
      0%, 100% { transform: scaleX(1); opacity: 0.25; }
      45% { transform: scaleX(0.6); opacity: 0.1; }
    }

    @keyframes blink {
      0%, 40%, 44%, 100% { transform: scaleY(1); }
      42% { transform: scaleY(0.1); }
    }

    /* Sparkles around mochi */
    .sparkle {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .sparkle::before, .sparkle::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .sparkle::before {
      width: 5px; height: 2px;
      top: 1.5px; left: 0;
    }

    .sparkle::after {
      width: 2px; height: 5px;
      top: 0; left: 1.5px;
    }

    .sparkle.s1 { top: 10px; left: 30px; background: #a78bfa; animation: twinkle 2s 0s ease-in-out infinite; }
    .sparkle.s2 { top: 30px; right: 30px; background: #f472b6; animation: twinkle 2s 0.5s ease-in-out infinite; }
    .sparkle.s3 { top: 50px; left: 20px; background: #60a5fa; animation: twinkle 2s 1s ease-in-out infinite; }
    .sparkle.s4 { top: 15px; right: 50px; background: #fbbf24; animation: twinkle 2s 1.4s ease-in-out infinite; }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(45deg); }
    }

    /* Sakura petals */
    .petal {
      position: absolute;
      width: 8px;
      height: 8px;
      background: rgba(244, 114, 182, 0.5);
      border-radius: 50% 0 50% 0;
      animation: petal-fall linear infinite;
    }

    @keyframes petal-fall {
      0% { transform: translateY(-10px) translateX(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { transform: translateY(130px) translateX(30px) rotate(320deg); opacity: 0; }
    }

    /* Kaomoji + step text */
    .loading-kaomoji {
      font-size: 1.3rem;
      color: #c4b5fd;
      animation: kaomoji-pulse 2s ease-in-out infinite;
      min-height: 1.6em;
    }

    @keyframes kaomoji-pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    .loading-step {
      color: #6a5a8a;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ── Modal loading ── */
    .modal-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0;
    }

    .mini-chibi {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: mini-hop 0.9s ease-in-out infinite;
    }

    .mini-head { position: relative; animation: mini-squash 0.9s ease-in-out infinite; }

    .mini-hair-dome {
      position: absolute; top: -2px; left: -2px; right: -2px;
      height: 14px; border-radius: 50% 50% 0 0; z-index: 1;
    }

    .mini-face {
      width: 28px; height: 26px;
      background: #fde4d2; border-radius: 50%;
      position: relative; z-index: 2;
    }

    .m-eye {
      position: absolute; width: 3px; height: 4px;
      border-radius: 50%; top: 11px;
      animation: blink 4s ease-in-out infinite;
    }
    .m-eye.l { left: 8px; }
    .m-eye.r { right: 8px; }

    .mini-outfit {
      width: 20px; height: 10px;
      border-radius: 2px 2px 4px 4px; margin-top: -1px;
    }

    .mini-shad {
      width: 22px; height: 4px;
      background: rgba(120,80,180,0.1);
      border-radius: 50%; margin-top: 2px;
      animation: shadow-scale 0.9s ease-in-out infinite;
    }

    @keyframes mini-hop {
      0%, 100% { transform: translateY(0); }
      45% { transform: translateY(-12px); }
    }

    @keyframes mini-squash {
      0%, 100% { transform: scaleX(1) scaleY(1); }
      80% { transform: scaleX(1.08) scaleY(0.92); }
    }

    .modal-loading-sparkles {
      display: flex;
      gap: 0.4rem;
    }

    .ml-sparkle {
      font-size: 0.75rem;
      animation: twinkle 1.2s ease-in-out infinite;
    }

    .ml-sparkle:nth-child(1) { color: #a78bfa; animation-delay: 0s; }
    .ml-sparkle:nth-child(2) { color: #f472b6; animation-delay: 0.25s; }
    .ml-sparkle:nth-child(3) { color: #60a5fa; animation-delay: 0.5s; }
    .ml-sparkle:nth-child(4) { color: #fbbf24; animation-delay: 0.75s; }

    .modal-loading-text {
      color: #7a6a9a;
      font-size: 0.82rem;
      font-style: italic;
      animation: kaomoji-pulse 2.5s ease-in-out infinite;
    }
  </style>
</head>
<body>

<header>
  <h1>Watch My Show</h1>
  <p>Describe what you're in the mood for — We will find the perfect match.</p>
</header>

<div class="search-section">
  <div class="category-tabs">
    <button class="cat-tab active" data-cat="anime" onclick="setCategory(this)"><span class="cat-icon">🎌</span>Anime</button>
    <button class="cat-tab" data-cat="movie" onclick="setCategory(this)"><span class="cat-icon">🎬</span>Movies</button>
    <button class="cat-tab" data-cat="series" onclick="setCategory(this)"><span class="cat-icon">📺</span>Series</button>
    <button class="cat-tab" data-cat="cartoon" onclick="setCategory(this)"><span class="cat-icon">🖍️</span>Cartoons</button>

  </div>
  <div class="search-box">
    <textarea id="pref-input" placeholder="e.g. dark fantasy with complex characters and slow world-building..."></textarea>
    <button id="search-btn" onclick="getRecommendations()">Recommend</button>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="personalized" onclick="setMode(this)">
      <span class="mode-icon">🎯</span>Personalized Match
    </button>
    <button class="mode-btn" data-mode="trending" onclick="setMode(this)">
      <span class="mode-icon">🔥</span>Trending & Popular
    </button>
  </div>
  <div class="controls-row">
    <div class="creativity-slider">
      <label>Safe Picks</label>
      <input type="range" id="creativity-range" min="0" max="100" value="50" oninput="updateCreativity(this.value)" />
      <label>Surprise Me</label>
    </div>
    <div class="count-selector">
      <span class="count-label">Results:</span>
      <button class="count-btn" data-count="6" onclick="setCount(this)">6</button>
      <button class="count-btn active" data-count="9" onclick="setCount(this)">9</button>
      <button class="count-btn" data-count="12" onclick="setCount(this)">12</button>
    </div>
  </div>
  <div class="examples" id="example-chips"></div>
</div>

<div id="status"></div>
<div id="results" class="results"></div>

<div class="bmc-footer">
  <a class="bmc-link" href="https://buymeacoffee.com/pratik142857" target="_blank" rel="noopener">
    <span class="bmc-icon">💪</span> Buy Pratik a Protein Bar
  </a>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <img id="modal-img" class="modal-image" src="" alt="" />
    <div class="modal-body">
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-meta" class="modal-meta"></div>
      <div id="modal-providers" class="provider-bar"></div>
      <div id="modal-explanation" class="modal-explanation loading">Asking Claude why this fits your taste…</div>
      <button class="modal-close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
  const input = document.getElementById('pref-input');
  const btn = document.getElementById('search-btn');
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  const backdrop = document.getElementById('modal-backdrop');

  let lastPreference = '';
  let currentMode = 'personalized';
  let currentCategory = 'anime';
  let currentCreativity = 0.5;
  let currentCount = 9;
  let stepTimer = null;
  let kaomojiTimer = null;

  function updateCreativity(val) {
    currentCreativity = parseInt(val, 10) / 100;
  }

  function setCount(el) {
    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentCount = parseInt(el.dataset.count, 10);
  }

  const CATEGORY_CONFIG = {
    anime: {
      placeholder: 'e.g. dark fantasy with complex characters and slow world-building...',
      examples: ['dark fantasy, morally grey', 'cozy slice of life, emotional', 'mecha, epic battles', 'psychological thriller', 'romance, high school'],
      steps: [
        'Identifying genres from your preference…',
        'Searching anime database on MyAnimeList…',
        'Reading web reviews for top candidates…',
        'Ranking the best matches for you…',
        'Fetching artwork and metadata…',
      ],
      cardIcon: '🎌',
    },
    movie: {
      placeholder: 'e.g. mind-bending sci-fi with plot twists like Inception...',
      examples: ['mind-bending sci-fi', 'feel-good comedy, heartwarming', 'gritty crime thriller', 'epic historical drama', 'horror, supernatural'],
      steps: [
        'Analyzing your movie taste…',
        'Searching film database on TMDB…',
        'Reading critic and audience reviews…',
        'Ranking the best matches for you…',
        'Fetching posters and metadata…',
      ],
      cardIcon: '🎬',
    },
    series: {
      placeholder: 'e.g. gripping drama with complex characters like Breaking Bad...',
      examples: ['gripping drama, antihero', 'sci-fi mystery, dystopian', 'dark comedy, satire', 'true crime, documentary style', 'political thriller'],
      steps: [
        'Analyzing your series taste…',
        'Searching TV database on TMDB…',
        'Reading reviews and ratings…',
        'Ranking the best matches for you…',
        'Fetching posters and metadata…',
      ],
      cardIcon: '📺',
    },
    cartoon: {
      placeholder: 'e.g. epic adventure like Avatar: The Last Airbender...',
      examples: ['epic adventure, coming of age', 'adult comedy, satirical', 'superhero action', 'wholesome kids, educational', 'dark and surreal'],
      steps: [
        'Analyzing your animation taste…',
        'Searching animated shows on TMDB…',
        'Reading reviews and ratings…',
        'Ranking the best matches for you…',
        'Fetching artwork and metadata…',
      ],
      cardIcon: '🖍️',
    },
    any: {
      placeholder: 'e.g. epic stories with deep world-building across any medium...',
      examples: ['mind-bending stories', 'feel-good comfort watches', 'dark and gritty', 'coming of age, emotional', 'action-packed adventures'],
      steps: [
        'Analyzing your entertainment taste…',
        'Searching across anime, movies, series & cartoons…',
        'Reading reviews and ratings…',
        'Picking the best mix for you…',
        'Fetching artwork and metadata…',
      ],
      cardIcon: '🎲',
    },
  };

  function setCategory(el) {
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentCategory = el.dataset.cat;
    const cfg = CATEGORY_CONFIG[currentCategory];
    input.placeholder = cfg.placeholder;
    renderExamples();
  }

  function renderExamples() {
    const cfg = CATEGORY_CONFIG[currentCategory];
    document.getElementById('example-chips').innerHTML = cfg.examples
      .map(e => `<span class="example-chip" onclick="useExample(this)">${e}</span>`)
      .join('');
  }

  renderExamples();

  function setMode(el) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentMode = el.dataset.mode;
  }

  const KAOMOJI = [
    '(ﾉ◕ヮ◕)ﾉ*:・ﾟ✧',
    '٩(◕‿◕｡)۶',
    '(づ￣ ³￣)づ',
    '☆*:.｡.o(≧▽≦)o.｡.:*☆',
    '(ノ´ヮ`)ノ*: ・ﾟ✧',
    '(◠‿◠)',
    '(*≧ω≦)',
    '(✧ω✧)',
    'ヾ(＾∇＾)',
    '(⌐■_■)',
  ];

  const MODAL_MSGS = [
    'Consulting the anime scrolls…',
    'Channeling inner otaku energy…',
    'Reading between the frames…',
    'Analyzing character arcs…',
    'Decoding the plot threads…',
  ];

  const CHARACTERS = [
    {
      name: 'Anya', hair: 'anya', hairColor: '#f7a8b8',
      eyeColor: '#4ade80', outfitColor: '#1a1a3e',
      blush: true, accessory: '',
      quote: 'Anya is using her telepathy to find your anime!',
    },
    {
      name: 'Mikasa', hair: 'mikasa', hairColor: '#1a1a2e',
      eyeColor: '#1f2937', outfitColor: '#4a3a2a',
      blush: false, accessory: 'scarf',
      quote: 'Mikasa is scouting the best recommendations…',
    },
    {
      name: 'Goku', hair: 'goku', hairColor: '#1a1a2e',
      eyeColor: '#1f2937', outfitColor: '#f97316',
      blush: false, accessory: '',
      quote: 'Goku is powering up your recommendations!',
    },
    {
      name: 'Edward', hair: 'edward', hairColor: '#fbbf24',
      eyeColor: '#f59e0b', outfitColor: '#dc2626',
      blush: false, accessory: '',
      quote: 'Equivalent exchange: your taste for great anime!',
    },
    {
      name: 'Zero Two', hair: 'zerotwo', hairColor: '#f472b6',
      eyeColor: '#22d3ee', outfitColor: '#ef4444',
      blush: true, accessory: 'horns',
      quote: 'Darling, finding the perfect anime for you…',
    },
  ];

  const sessionChar = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];

  function buildCharacter(c) {
    const blush = c.blush
      ? '<div class="c-blush l"></div><div class="c-blush r"></div>' : '';
    let acc = '';
    if (c.accessory === 'scarf') acc = '<div class="chibi-scarf"></div>';
    if (c.accessory === 'horns')
      acc = '<div class="chibi-horns"><div class="horn l"></div><div class="horn r"></div></div>';

    return `
      <div class="chibi-char">
        <div class="chibi-head">
          <div class="chibi-hair hair-${c.hair}"></div>
          ${acc}
          <div class="chibi-face">
            <div class="c-eye l" style="background:${c.eyeColor}"></div>
            <div class="c-eye r" style="background:${c.eyeColor}"></div>
            ${blush}
            <div class="c-mouth"></div>
          </div>
        </div>
        <div class="chibi-outfit" style="background:${c.outfitColor}"></div>
        <div class="chibi-shadow"></div>
      </div>`;
  }

  function buildMiniChar(c) {
    return `
      <div class="mini-chibi">
        <div class="mini-head">
          <div class="mini-hair-dome" style="background:${c.hairColor}"></div>
          <div class="mini-face">
            <div class="m-eye l" style="background:${c.eyeColor}"></div>
            <div class="m-eye r" style="background:${c.eyeColor}"></div>
          </div>
        </div>
        <div class="mini-outfit" style="background:${c.outfitColor}"></div>
        <div class="mini-shad"></div>
      </div>`;
  }

  function buildPetals() {
    let html = '';
    for (let i = 0; i < 7; i++) {
      const left = Math.random() * 220;
      const dur = 2.5 + Math.random() * 2;
      const delay = Math.random() * 3;
      const size = 6 + Math.random() * 5;
      html += `<div class="petal" style="left:${left}px;width:${size}px;height:${size}px;animation-duration:${dur}s;animation-delay:${delay}s"></div>`;
    }
    return html;
  }

  function startLoadingSteps() {
    let stepIdx = 0;
    let kIdx = 0;
    const steps = CATEGORY_CONFIG[currentCategory].steps;

    statusEl.innerHTML = `
      <div class="loading-scene">
        <div class="scene-stage">
          ${buildPetals()}
          <div class="sparkle s1"></div>
          <div class="sparkle s2"></div>
          <div class="sparkle s3"></div>
          <div class="sparkle s4"></div>
          ${buildCharacter(sessionChar)}
        </div>
        <div class="loading-quote">${sessionChar.quote}</div>
        <div class="loading-kaomoji" id="kaomoji-text">${KAOMOJI[0]}</div>
        <div class="loading-step"><span class="spinner"></span> <span id="step-text">${steps[0]}</span></div>
      </div>`;

    stepTimer = setInterval(() => {
      stepIdx = Math.min(stepIdx + 1, steps.length - 1);
      const el = document.getElementById('step-text');
      if (el) el.textContent = steps[stepIdx];
    }, 2500);

    kaomojiTimer = setInterval(() => {
      kIdx = (kIdx + 1) % KAOMOJI.length;
      const el = document.getElementById('kaomoji-text');
      if (el) el.textContent = KAOMOJI[kIdx];
    }, 1800);
  }

  function stopLoadingSteps() {
    clearInterval(stepTimer);
    clearInterval(kaomojiTimer);
    stepTimer = null;
    kaomojiTimer = null;
    statusEl.innerHTML = '';
  }

  function openModal(item) {
    document.getElementById('modal-title').textContent = item.title;
    const modalParts = [
      item.score != null ? `★ ${item.score.toFixed(1)}` : '',
      item.year ? `${item.year}` : '',
      item.episodes != null ? `${item.episodes} ep` : '',
      item.seasons != null ? `${item.seasons} season${item.seasons !== 1 ? 's' : ''}` : '',
      item.runtime != null ? `${item.runtime} min` : '',
      item.studio ? item.studio : '',
      item.director ? item.director : '',
      item.genres.join(' · '),
    ];
    document.getElementById('modal-meta').innerHTML = modalParts.filter(Boolean).join('&nbsp;&nbsp;·&nbsp;&nbsp;');

    const img = document.getElementById('modal-img');
    if (item.image_url) {
      img.src = item.image_url;
      img.style.display = 'block';
    } else {
      img.style.display = 'none';
    }

    const expl = document.getElementById('modal-explanation');
    const msgIdx = Math.floor(Math.random() * MODAL_MSGS.length);
    expl.innerHTML = `
      <div class="modal-loading">
        ${buildMiniChar(sessionChar)}
        <div class="modal-loading-sparkles">
          <span class="ml-sparkle">✦</span>
          <span class="ml-sparkle">✦</span>
          <span class="ml-sparkle">✦</span>
          <span class="ml-sparkle">✦</span>
        </div>
        <div class="modal-loading-text">${MODAL_MSGS[msgIdx]}</div>
      </div>`;
    expl.className = 'modal-explanation';
    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';

    const provBar = document.getElementById('modal-providers');
    provBar.innerHTML = '<span class="prov-loading">Finding where to watch...</span>';
    const region = (navigator.language || 'en-US').split('-').pop().toUpperCase() || 'US';
    const cat = item.category || currentCategory;
    const provParams = new URLSearchParams({ id: item.id, category: cat, region, title: item.title });
    fetch(`/api/providers?${provParams}`)
      .then(r => r.json())
      .then(providers => {
        if (!providers.length) {
          provBar.innerHTML = '<span class="provider-label">Streaming info not available for your region</span>';
          return;
        }
        const flatrate = providers.filter(p => p.type === 'flatrate' || p.type === 'free' || p.type === 'ads');
        const others = providers.filter(p => p.type === 'rent' || p.type === 'buy');
        let html = '';
        if (flatrate.length) {
          html += '<span class="provider-label">Stream:</span>';
          html += flatrate.map(p =>
            `<span class="provider-badge">${p.logo_url ? `<img src="${p.logo_url}" alt="${escHtml(p.name)}">` : ''}${escHtml(p.name)}</span>`
          ).join('');
        }
        if (others.length) {
          html += `<span class="provider-label" style="margin-left:${flatrate.length ? '0.6rem' : '0'}">Rent/Buy:</span>`;
          html += others.slice(0, 4).map(p =>
            `<span class="provider-badge">${p.logo_url ? `<img src="${p.logo_url}" alt="${escHtml(p.name)}">` : ''}${escHtml(p.name)}</span>`
          ).join('');
        }
        provBar.innerHTML = html;
      })
      .catch(() => { provBar.innerHTML = ''; });

    let modalMsgTimer = setInterval(() => {
      const txt = expl.querySelector('.modal-loading-text');
      if (txt) txt.textContent = MODAL_MSGS[Math.floor(Math.random() * MODAL_MSGS.length)];
    }, 2000);

    fetch('/api/explain', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        preference: lastPreference,
        title: item.title,
        synopsis: item.synopsis,
        genres: item.genres,
        category: currentCategory,
      }),
    })
      .then(async res => {
        clearInterval(modalMsgTimer);
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          expl.innerHTML = renderMarkdown(buffer);
        }
      })
      .catch(() => {
        clearInterval(modalMsgTimer);
        expl.textContent = 'Could not load explanation.';
      });
  }

  function closeModal(e) {
    if (e && e.target !== backdrop) return;
    backdrop.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); getRecommendations(); }
  });

  function useExample(el) {
    input.value = el.textContent;
    input.focus();
  }

  async function getRecommendations() {
    const preferences = input.value.trim();
    if (!preferences) return;
    lastPreference = preferences;

    btn.disabled = true;
    resultsEl.innerHTML = '';
    startLoadingSteps();

    try {
      const res = await fetch('/api/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ preferences, mode: currentMode, category: currentCategory, creativity: currentCreativity, count: currentCount }),
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();

      stopLoadingSteps();
      renderCards(data.recommendations);
    } catch (err) {
      stopLoadingSteps();
      statusEl.innerHTML = `<p class="error">Something went wrong: ${err.message}</p>`;
    } finally {
      btn.disabled = false;
    }
  }

  let _reserveItems = [];

  function buildCardHTML(a, icon) {
    const metaParts = [];
    if (a.score != null) metaParts.push(`<span class="score">★ ${a.score.toFixed(1)}</span>`);
    if (a.year) metaParts.push(`<span>${a.year}</span>`);
    if (a.episodes != null) metaParts.push(`<span>${a.episodes} ep</span>`);
    if (a.seasons != null) metaParts.push(`<span>${a.seasons} season${a.seasons !== 1 ? 's' : ''}</span>`);
    if (a.runtime != null) metaParts.push(`<span>${a.runtime} min</span>`);
    if (a.studio) metaParts.push(`<span>${escHtml(a.studio)}</span>`);
    if (a.director) metaParts.push(`<span>${escHtml(a.director)}</span>`);

    const tags = a.genres.map(g => `<span class="genre-tag">${escHtml(g)}</span>`);
    if (a.themes) tags.push(...a.themes.map(t => `<span class="theme-tag">${escHtml(t)}</span>`));

    return `
      <div class="card" onclick="openModal(window._itemData[${a.id}])">
        ${a.image_url
          ? `<img class="card-image" src="${a.image_url}" alt="${escHtml(a.title)}" loading="lazy" onerror="this.replaceWith(placeholder())">`
          : `<div class="card-image-placeholder">${icon}</div>`}
        <div class="card-body">
          <div class="card-title">${escHtml(a.title)}</div>
          <div class="card-meta">${metaParts.join('')}</div>
          <div class="genres">${tags.join('')}</div>
          ${a.reason ? `<p class="reason">${escHtml(a.reason)}</p>` : ''}
          ${a.synopsis ? `<p class="synopsis">${escHtml(a.synopsis)}</p>` : ''}
        </div>
        <div class="card-actions">
          <button class="dismiss-btn watched" onclick="event.stopPropagation(); dismissCard(this, ${a.id})">👁 Watched</button>
          <button class="dismiss-btn not-interested" onclick="event.stopPropagation(); dismissCard(this, ${a.id})">✕ Not Interested</button>
        </div>
      </div>`;
  }

  function _iconFor(item) {
    if (currentCategory === 'any' && item.category) {
      return (CATEGORY_CONFIG[item.category] || CATEGORY_CONFIG.any).cardIcon;
    }
    return CATEGORY_CONFIG[currentCategory].cardIcon;
  }

  function renderCards(items) {
    if (!items.length) {
      statusEl.innerHTML = '<p class="status">No results found. Try a different description.</p>';
      return;
    }

    window._itemData = {};
    items.forEach(a => { window._itemData[a.id] = a; });

    const displayed = items.slice(0, currentCount);
    _reserveItems = items.slice(currentCount);

    const noReserve = _reserveItems.length === 0 ? ' no-reserve' : '';

    resultsEl.innerHTML = displayed.map(a => {
      const icon = _iconFor(a);
      return `<div class="card-wrapper${noReserve}" data-item-id="${a.id}">${buildCardHTML(a, icon)}</div>`;
    }).join('');
  }

  function dismissCard(btnEl, itemId) {
    if (!_reserveItems.length) return;

    const wrapper = btnEl.closest('.card-wrapper');
    if (!wrapper || wrapper.classList.contains('flipping')) return;

    const replacement = _reserveItems.shift();
    window._itemData[replacement.id] = replacement;

    wrapper.classList.add('flipping');

    setTimeout(() => {
      const icon = _iconFor(replacement);
      wrapper.dataset.itemId = replacement.id;
      wrapper.innerHTML = buildCardHTML(replacement, icon);
      if (!_reserveItems.length) {
        document.querySelectorAll('.card-wrapper').forEach(w => w.classList.add('no-reserve'));
      }
      wrapper.classList.remove('flipping');
    }, 250);
  }

  function renderMarkdown(text) {
    return escHtml(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function placeholder() {
    const d = document.createElement('div');
    d.className = 'card-image-placeholder';
    d.textContent = CATEGORY_CONFIG[currentCategory].cardIcon;
    return d;
  }
</script>
</body>
</html>
